                    - /url: "#abstract"
                    - img [ref=e316]
                - paragraph [ref=e318]:
                  - text: Coreset is a small set that provides a data summary for a large dataset, such that training solely on the small set achieves competitive performance compared with a large dataset. In rehearsal-based continual learning, the coreset is typically used in the memory replay buffer to stand for representative samples in previous tasks, and the coreset selection procedure is typically formulated as a bilevel problem. However, the typical bilevel formulation for coreset selection explicitly performs optimization over discrete decision variables with greedy search, which is computationally expensive. Several works consider other formulations to address this issue, but they ignore the nested nature of bilevel optimization problems and may not solve the bilevel coreset selection problem accurately. To address these issues, we propose a new bilevel formulation, where the inner problem tries to find a model which minimizes the expected training error sampled from a given probability distribution, and the outer problem aims to learn the probability distribution with approximately
                  - math [ref=e320]:
                    - generic [ref=e321]: K
                  - text: (coreset size) nonzero entries such that learned model in the inner problem minimizes the training error over the whole data. To ensure the learned probability has approximately
                  - math [ref=e323]:
                    - generic [ref=e324]: K
                  - text: nonzero entries, we introduce a novel regularizer based on the smoothed top-$K$ loss in the upper problem. We design a new optimization algorithm that provably converges to the
                  - math [ref=e326]:
                    - generic [ref=e327]: ϵ
                  - text: "-stationary point with"
                  - math [ref=e329]:
                    - generic [ref=e330]: O
                    - generic [ref=e331]: (
                    - generic [ref=e332]: "1"
                    - generic [ref=e334]: /
                    - generic [ref=e335]:
                      - generic [ref=e336]: ϵ
                      - generic [ref=e337]: "4"
                    - generic [ref=e338]: )
                  - text: computational complexity. We conduct extensive experiments in various settings in continual learning, including balanced data, imbalanced data, and label noise, to show that our proposed formulation and new algorithm significantly outperform competitive baselines. From bilevel optimization point of view, our algorithm significantly improves the vanilla greedy coreset selection method in terms of running time on continual learning benchmark datasets.
